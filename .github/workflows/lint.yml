# ------------------------------------------------------------------------------
# This workflow runs lightweight lint checks for shell scripts and Dockerfiles.
#
# The repo has a small but important shell and container surface area, so this
# workflow focuses on the files most likely to break startup, healthchecks, or
# release packaging.
# ------------------------------------------------------------------------------

name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - automation

jobs:
  shell-and-docker:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Fetch the repository contents for lint execution.
      # ------------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Install shell lint tooling used by this workflow.
      # ------------------------------------------------------------------------
      - name: Install shell tooling
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      # ------------------------------------------------------------------------
      # Run POSIX syntax validation against the maintained shell scripts.
      # ------------------------------------------------------------------------
      - name: Check shell syntax
        run: |
          set -eu

          for script_path in \
            scripts/entrypoint.sh \
            scripts/healthcheck.sh \
            scripts/start.sh
          do
            sh -n "${script_path}"
          done

      # ------------------------------------------------------------------------
      # Run ShellCheck against the maintained shell scripts.
      # ------------------------------------------------------------------------
      - name: Run ShellCheck
        run: |
          set -eu

          shellcheck \
            scripts/entrypoint.sh \
            scripts/healthcheck.sh \
            scripts/start.sh

      # ------------------------------------------------------------------------
      # Run Hadolint against the project Dockerfile.
      #
      # N.B.
      # The repo currently does not pin Alpine package versions in "apk add"
      # lines, so "DL3018" is treated as advisory rather than release-blocking.
      # ------------------------------------------------------------------------
      - name: Run Hadolint
        run: |
          set -eu
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3018 - < Dockerfile
