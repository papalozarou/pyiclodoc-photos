# ------------------------------------------------------------------------------
# This workflow creates a GitHub Release when a version tag is pushed.
#
# The workflow is intentionally self-contained so release publication does not
# depend on a third-party marketplace action. It creates the release only when
# the pushed tag does not already have one, which keeps reruns idempotent.
# ------------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Check whether the pushed tag already has a GitHub Release object.
      # ------------------------------------------------------------------------
      - name: Check existing release
        id: check-existing-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          STATUS_CODE="$(
            curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/releases/tags/${TAG_NAME}"
          )"

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "release_exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "release_exists=false" >> "${GITHUB_OUTPUT}"

      # ------------------------------------------------------------------------
      # Create the GitHub Release for the pushed version tag.
      #
      # N.B.
      # "generate_release_notes" lets GitHub build release notes from merged
      # pull requests and commits without maintaining a separate changelog file.
      # ------------------------------------------------------------------------
      - name: Create release
        if: steps.check-existing-release.outputs.release_exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "tag_name": os.environ["TAG_NAME"],
              "name": os.environ["TAG_NAME"],
              "generate_release_notes": True,
              "draft": False,
              "prerelease": False,
          }

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPOSITORY']}/releases",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              if response.status not in {200, 201}:
                  raise SystemExit(
                      f"Release creation failed with status {response.status}"
                  )
          PY
