# ------------------------------------------------------------------------------
# This workflow validates the repository's core documentation files.
#
# The checks are intentionally practical: confirm the required docs exist and
# ensure relative Markdown links between project docs resolve cleanly.
# ------------------------------------------------------------------------------

name: Docs

on:
  pull_request:
  push:
    branches:
      - main
      - automation

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Fetch the repository contents for documentation checks.
      # ------------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Install the supported Python runtime for the docs checker script.
      # ------------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------------
      # Run the repository-owned documentation checker.
      # ------------------------------------------------------------------------
      - name: Check documentation
        run: python3 scripts/check_docs.py
